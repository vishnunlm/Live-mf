<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#030812"/>
<meta name="description" content="MFSignal \u2014 Live NAV estimation, BuyLow signals & real-time alerts for Parag Parikh, Nippon Small Cap, HDFC Midcap"/>
<title>MFSignal \u2014 Live MF Intelligence</title>
<link rel="manifest" href="data:application/json,{}"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   RESET & ROOT
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060a14;--s1:#0a1020;--s2:#0e1628;--s3:#121e32;
  --b1:#1a2840;--b2:#223050;--b3:#2c3d62;
  --t1:#f0f6ff;--t2:#8ba8cc;--t3:#4a6080;--t4:#263448;
  --green:#00d68f;--gd:#00d68f18;--gb:#001f12;
  --amber:#f5a623;--ad:#f5a62318;--ab:#1c1000;
  --blue:#4db8ff;--bd:#4db8ff15;--bb:#001828;
  --red:#ff5c5c;--rd:#ff5c5c15;--rb:#1c0505;
  --purple:#a78bfa;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --shadow:0 4px 24px #00000055;
  --shadow-glow:0 0 30px #00d68f22;
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.5}
img,svg{display:block;max-width:100%}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;outline:none}
input,select{font-family:'Outfit',sans-serif}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   BACKGROUND MESH
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 15%,#00d68f08 0%,transparent 70%),
    radial-gradient(ellipse 50% 35% at 90% 80%,#4db8ff08 0%,transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 50%,#1a284008 0%,transparent 70%);
  pointer-events:none;z-index:0
}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   LOADER
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
#splash{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .5s ease
}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--green),#00a86b);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 40px #00d68f44;animation:float 2s ease-in-out infinite
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.splash-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-sub{font-size:12px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.splash-bar{width:200px;height:2px;background:var(--b2);border-radius:2px;overflow:hidden}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));width:0%;transition:width .4s ease;border-radius:2px}
#splash-msg{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   MAIN LAYOUT
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* \u2500\u2500 NAV BAR \u2500\u2500 */
.navbar{
  position:sticky;top:0;z-index:500;
  background:#060a14ee;border-bottom:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px
}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--green),#00a86b);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-name{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.01em}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid;letter-spacing:.03em}
.pill-green{border-color:var(--green)44;color:var(--green);background:var(--gb)}
.pill-time{border-color:var(--b2);color:var(--t2);background:var(--s1);font-family:'JetBrains Mono',monospace;font-size:11px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 1.2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.alert-bell{width:34px;height:34px;border-radius:8px;background:var(--s2);border:1px solid var(--b2);color:var(--t2);font-size:16px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.alert-bell:hover{border-color:var(--amber);color:var(--amber)}
.alert-bell .badge-count{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

/* \u2500\u2500 ALERT PANEL \u2500\u2500 */
.alert-panel{
  position:fixed;top:68px;right:16px;width:340px;max-width:calc(100vw - 32px);
  background:var(--s1);border:1px solid var(--b2);border-radius:var(--r-lg);
  box-shadow:var(--shadow);z-index:600;overflow:hidden;
  transform:translateY(-10px);opacity:0;pointer-events:none;
  transition:all .25s cubic-bezier(.175,.885,.32,1.275)
}
.alert-panel.open{transform:translateY(0);opacity:1;pointer-events:all}
.alert-hdr{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.alert-hdr-title{font-size:13px;font-weight:700;color:var(--t1)}
.alert-actions{display:flex;gap:8px}
.btn-sm{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid var(--b2);background:var(--s2);color:var(--t2)}
.btn-sm:hover{border-color:var(--green);color:var(--green)}
.alert-list{max-height:300px;overflow-y:auto}
.alert-item{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;gap:10px;align-items:flex-start;transition:background .15s}
.alert-item:hover{background:var(--s2)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}
.alert-content{}
.alert-time{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.alert-text{font-size:12px;color:var(--t1)}
.alert-fund{font-size:10px;color:var(--t3);margin-top:2px}
.alert-empty{padding:24px;text-align:center;color:var(--t3);font-size:12px}
.alert-footer{padding:12px 16px;border-top:1px solid var(--b1)}
.notif-toggle{display:flex;align-items:center;justify-content:space-between;gap:10px}
.notif-lbl{font-size:11px;color:var(--t2)}
.toggle-wrap{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--b2);border-radius:20px;transition:background .2s;cursor:pointer}
.toggle-track::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-wrap input:checked + .toggle-track{background:var(--green)}
.toggle-wrap input:checked + .toggle-track::after{transform:translateX(18px)}

/* \u2500\u2500 FUND TABS \u2500\u2500 */
.fund-tabs-wrap{padding:16px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fund-tabs{display:flex;gap:10px;min-width:max-content}
.ftab{
  padding:10px 20px;border-radius:var(--r-sm);border:1px solid var(--b1);
  background:var(--s1);color:var(--t3);font-size:13px;font-weight:600;
  white-space:nowrap;transition:all .2s;position:relative;overflow:hidden
}
.ftab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--fc,var(--green));opacity:0;transition:opacity .2s}
.ftab.active{background:var(--s2);color:var(--fc,var(--green));border-color:var(--fc,var(--green))44}
.ftab.active::after{opacity:1}
.ftab:hover:not(.active){background:var(--s2);color:var(--t2)}
.ftab-sub{font-size:10px;font-weight:400;margin-top:2px;opacity:.7;display:block}

/* \u2500\u2500 MAIN CONTENT \u2500\u2500 */
.main{padding:16px 20px 80px;max-width:1400px;margin:0 auto;width:100%}

/* \u2500\u2500 STATUS BAR \u2500\u2500 */
.status-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:8px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r-sm);
  margin-bottom:14px;font-size:11px
}
.status-indicator{display:flex;align-items:center;gap:6px}
.s-dot{width:7px;height:7px;border-radius:50%}
.s-dot.ok{background:var(--green)}
.s-dot.loading{background:var(--amber);animation:pulse-dot .8s infinite}
.s-dot.err{background:var(--red)}
.status-text{color:var(--t2)}
.refresh
